<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — UM-Dearborn ABET Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <img src="assets/images/umd_logo.png" alt="UM-Dearborn Logo" class="logo">
    <h2 id="role-title">Sign in</h2>

    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" required>

      <label for="password">Password</label>
      <input type="password" id="password" required>

      <button type="submit" class="button">Login</button>
    </form>

    <p class="forgot-password">
      <a href="password_reset.html">Forgot your password?</a>
    </p>


    <p class="back-link">
      <a href="index.html">← Back to role selection</a>
    </p>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
