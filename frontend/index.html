<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UM-Dearborn ABET Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="role-select-page">
  <div class="role-container">
    <img src="assets/images/umd_logo.png" alt="UM-Dearborn Logo" class="logo">
    <h1>Welcome to the UM-Dearborn ABET Portal</h1>
    <p>Select your role to continue</p>
    <div class="role-buttons">
      <button class="role-btn" data-role="admin">Admin</button>
      <button class="role-btn" data-role="chair">Department Chair</button>
      <button class="role-btn" data-role="faculty">Faculty</button>
      <button class="role-btn" data-role="evaluator">ABET Evaluator</button>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
